<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutStocks — Fantasy ROI</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 UMD + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    // --------------------------- Helpers ---------------------------
    const LS_KEY = "futstocks_state_v1";
    const POS = { GK:"GK", DEF:"DEF", MID:"MID", FWD:"FWD" };
    const clamp = (v,min,max)=> Math.min(max, Math.max(min, v));
    const randInt = (a,b)=> Math.floor(Math.random()*(b-a+1))+a;
    const chance = (p)=> Math.random() < p;

    const loadState = () => { try{ const raw=localStorage.getItem(LS_KEY); return raw? JSON.parse(raw): null; } catch { return null; } };
    const saveState = (s) => { try{ localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {} };

    // --------------------------- Seed Data ---------------------------
    const TEAMS = [
      { id:"MUN", name:"Manchester United" },
      { id:"MCI", name:"Manchester City" },
      { id:"ARS", name:"Arsenal" },
      { id:"LIV", name:"Liverpool" },
      { id:"CHE", name:"Chelsea" },
      { id:"TOT", name:"Tottenham" },
    ];

    const PLAYERS = [
      { id:"p1", name:"Marcus Rashford",  pos:POS.FWD, team:"MUN", basePrice:140 },
      { id:"p2", name:"Bruno Fernandes",  pos:POS.MID, team:"MUN", basePrice:135 },
      { id:"p3", name:"Erling Haaland",   pos:POS.FWD, team:"MCI", basePrice:160 },
      { id:"p4", name:"Phil Foden",       pos:POS.MID, team:"MCI", basePrice:150 },
      { id:"p5", name:"Bukayo Saka",      pos:POS.FWD, team:"ARS", basePrice:145 },
      { id:"p6", name:"Martin Ødegaard",  pos:POS.MID, team:"ARS", basePrice:142 },
      { id:"p7", name:"Mohamed Salah",    pos:POS.FWD, team:"LIV", basePrice:155 },
      { id:"p8", name:"Virgil van Dijk",  pos:POS.DEF, team:"LIV", basePrice:120 },
      { id:"p9", name:"Cole Palmer",      pos:POS.MID, team:"CHE", basePrice:138 },
      { id:"p10",name:"Raheem Sterling",  pos:POS.FWD, team:"CHE", basePrice:128 },
      { id:"p11",name:"Heung‑min Son",    pos:POS.FWD, team:"TOT", basePrice:150 },
      { id:"p12",name:"James Maddison",   pos:POS.MID, team:"TOT", basePrice:135 },
    ];

    const hoursFromNow = (h)=> { const t=new Date(); t.setHours(t.getHours()+h); return t.toISOString(); };
    const FIXTURES = [
      { id:"f1", home:"MUN", away:"MCI", kickoff:hoursFromNow(2), status:"upcoming", homePlayers:["p1","p2"], awayPlayers:["p3","p4"], result:null },
      { id:"f2", home:"ARS", away:"LIV", kickoff:hoursFromNow(4), status:"upcoming", homePlayers:["p5","p6"], awayPlayers:["p7","p8"], result:null },
      { id:"f3", home:"CHE", away:"TOT", kickoff:hoursFromNow(6), status:"upcoming", homePlayers:["p9","p10"], awayPlayers:["p11","p12"], result:null },
    ];

    // --------------------------- Scoring ---------------------------
    function scoreForPlayer(stat, pos, teamResult){
      let s=0;
      if(teamResult==="W") s+=10; else if(teamResult==="D") s+=3;
      if(stat.minutes>=90) s+=6; else if(stat.minutes>=60) s+=4; else if(stat.minutes>0) s+=2;
      const goalPts = pos===POS.FWD?8: pos===POS.MID?10: 12;
      s += goalPts*(stat.goals||0);
      s += 6*(stat.assists||0);
      if((pos===POS.DEF||pos===POS.GK) && stat.minutes>=60 && stat.cleanSheet) s+=8;
      if(pos===POS.GK){ s+=Math.floor((stat.saves||0)/3); s+=8*(stat.penSaves||0); }
      s -= 3*(stat.yellow||0); s -= 7*(stat.red||0);
      s -= 6*(stat.ownGoals||0); s -= 5*(stat.penMiss||0); s -= 5*(stat.penConceded||0);
      return s;
    }
    const newValueFromScore = (base,score)=> Math.round(clamp(base*(1+score/50), base*0.2, base*3));

    function randomStatline(pos, gf, ga){
      const minutes = chance(0.1)?0: chance(0.15)?randInt(1,59): chance(0.35)?randInt(60,89): 90;
      let goals=0,assists=0,yellow=0,red=0,ownGoals=0,penMiss=0,penSaves=0,saves=0,penConceded=0;
      if(minutes>0){
        if(pos===POS.FWD) goals = chance(0.35)?1: chance(0.12)?2: chance(0.03)?3: 0;
        if(pos===POS.MID) goals = chance(0.18)?1: chance(0.05)?2: 0;
        if(pos===POS.DEF) goals = chance(0.08)?1: 0;
        assists = chance(0.25)?1: chance(0.07)?2: 0;
        yellow = chance(0.15)?1:0; red = yellow? (chance(0.05)?1:0) : (chance(0.02)?1:0);
        ownGoals = chance(0.01)?1:0; penMiss = chance(0.03)?1:0;
        if(pos===POS.GK){ saves=randInt(0,9); penSaves=chance(0.05)?1:0; }
        else if(pos===POS.DEF){ penConceded=chance(0.03)?1:0; }
        else if(pos===POS.MID){ penConceded=chance(0.02)?1:0; }
        else { penConceded=chance(0.01)?1:0; }
      }
      const cleanSheet = minutes>=60 && ga===0;
      return { minutes, goals, assists, yellow, red, ownGoals, penMiss, penSaves, saves, penConceded, cleanSheet };
    }

    // --------------------------- UI Helpers ---------------------------
    const fmtTeam = (id, teamById)=> teamById[id]?.name || id;
    const fmtTime = (iso)=> new Date(iso).toLocaleString();

    function Tab({label,value,active,onClick}){
      const isActive = active===value;
      return (
        <button onClick={()=>onClick(value)} className={`px-3 py-1 rounded ${isActive? "bg-slate-900 text-white":"bg-white border"}`}>
          {label}
        </button>
      );
    }

    function EmptyCard({title,subtitle}){
      return (
        <div className="border rounded-lg p-6 bg-white text-center">
          <div className="font-semibold">{title}</div>
          <div className="text-xs text-slate-500">{subtitle}</div>
        </div>
      );
    }

    // --------------------------- Components ---------------------------
    function MarketGrid({fixtures,players,teams,onBuy}){
      const teamById = Object.fromEntries(teams.map(t=>[t.id,t]));
      const upcoming = fixtures.filter(f=>f.status==="upcoming");
      return (
        <div className="grid gap-4">
          {upcoming.length===0 && <EmptyCard title="No upcoming fixtures" subtitle="Resolve some matches or reset the game."/>}
          {upcoming.map(f=>(
            <div key={f.id} className="border rounded-lg p-4 bg-white">
              <div className="mb-2 text-sm font-semibold">
                {fmtTeam(f.home, teamById)} vs {fmtTeam(f.away, teamById)} · <span className="text-slate-500">{fmtTime(f.kickoff)}</span>
              </div>
              <div className="grid gap-2">
                {[...f.homePlayers, ...f.awayPlayers].map(pid=>{
                  const p = players.find(x=>x.id===pid);
                  if(!p) return null;
                  return (
                    <div key={pid} className="flex items-center justify-between border rounded p-2">
                      <div className="text-sm">{p.name} <span className="text-slate-500 text-xs">({p.pos})</span></div>
                      <button onClick={()=>onBuy(p.id, f.id, 1)} className="px-2 py-1 bg-slate-900 text-white rounded text-sm">
                        Buy · {p.basePrice}c
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // --------------------------- Main App ---------------------------
    function App(){
      const [state,setState] = useState(()=> loadState() || ({
        balance: 500,
        players: PLAYERS,
        teams: TEAMS,
        fixtures: FIXTURES,
        portfolio: [], // {id, playerId, fixtureId, boughtPrice, quantity, soldAt}
        tx: [],
      }));
      const [tab,setTab] = useState("market");

      useEffect(()=> saveState(state), [state]);

      const byId = useMemo(()=>({
        player: Object.fromEntries(state.players.map(p=>[p.id,p])),
        team: Object.fromEntries(state.teams.map(t=>[t.id,t])),
        fixture: Object.fromEntries(state.fixtures.map(f=>[f.id,f])),
      }),[state.players,state.teams,state.fixtures]);

      function teamResultForPlayer(pid, fixture){
        const isHome = fixture.homePlayers.includes(pid);
        const { homeGoals, awayGoals } = fixture.result || {};
        if(homeGoals==null || awayGoals==null) return "D";
        if(homeGoals===awayGoals) return "D";
        return (isHome? homeGoals>awayGoals : awayGoals>homeGoals) ? "W" : "L";
      }

      function buyCard(playerId, fixtureId, qty=1){
        const p = byId.player[playerId];
        const f = byId.fixture[fixtureId];
        if(!p || !f || f.status!=="upcoming") return;
        const cost = p.basePrice * qty;
        if(state.balance < cost) return alert("Not enough coins");
        const item = { id:`card_${Date.now()}`, playerId, fixtureId, boughtPrice:p.basePrice, quantity:qty, soldAt:null };
        setState(s=>({
          ...s,
          balance: s.balance - cost,
          portfolio: [item, ...s.portfolio],
          tx: [{ id:`tx_${Date.now()}`, type:"BUY", amount:-cost, ts:new Date().toISOString(), meta:{ playerId, fixtureId, qty } }, ...s.tx],
        }));
      }

      function sellCard(cardId){
        const card = state.portfolio.find(c=>c.id===cardId);
        if(!card || card.soldAt) return;
        const player = byId.player[card.playerId];
        const fixture = byId.fixture[card.fixtureId];
        if(!fixture || fixture.status!=="finished") return alert("Match not finished yet.");
        const stat = fixture.result?.stats?.[card.playerId] || {};
        const teamRes = teamResultForPlayer(card.playerId, fixture);
        const score = scoreForPlayer(stat, player.pos, teamRes);
        const current = newValueFromScore(player.basePrice, score) * card.quantity;
        setState(s=>({
          ...s,
          balance: s.balance + current,
          portfolio: s.portfolio.map(c=> c.id===cardId? { ...c, soldAt: current } : c),
          tx: [{ id:`tx_${Date.now()}`, type:"SELL", amount: current, ts:new Date().toISOString(), meta:{ cardId } }, ...s.tx],
        }));
      }

      function resolveFixture(fixtureId){
        const idx = state.fixtures.findIndex(f=>f.id===fixtureId);
        if(idx===-1) return;
        const f = state.fixtures[idx];
        if(f.status==="finished") return;

        const homeGoals = randInt(0,4);
        const awayGoals = randInt(0,4);
        const stats = {};
        for(const pid of [...f.homePlayers, ...f.awayPlayers]){
          const p = byId.player[pid];
          const isHome = f.homePlayers.includes(pid);
          const gf = isHome ? homeGoals : awayGoals;
          const ga = isHome ? awayGoals : homeGoals;
          stats[pid] = randomStatline(p.pos, gf, ga);
        }

        const updated = { ...f, status:"finished", result:{ homeGoals, awayGoals, stats } };
        setState(s=>({ ...s, fixtures: s.fixtures.map((fx,i)=> i===idx ? updated : fx) }));
      }

      const portfolioWithMeta = state.portfolio.map(c=>{
        const player = byId.player[c.playerId];
        const fixture = byId.fixture[c.fixtureId];
        const invested = c.boughtPrice * c.quantity;
        let current = invested;
        if(fixture && fixture.status==="finished"){
          const stat = fixture.result?.stats?.[c.playerId] || {};
          const teamRes = teamResultForPlayer(c.playerId, fixture);
          const score = scoreForPlayer(stat, player.pos, teamRes);
          current = newValueFromScore(player.basePrice, score) * c.quantity;
        }
        const roi = invested ? (current - invested) / invested : 0;
        return { ...c, player, fixture, invested, current, roi };
      });

      const portfolioOpenValue = portfolioWithMeta.filter(c=>!c.soldAt).reduce((s,c)=>s+c.current,0);
      const netWorth = state.balance + portfolioOpenValue;

      return (
        <div className="min-h-screen">
          <header className="sticky top-0 z-10 border-b bg-white">
            <div className="mx-auto max-w-6xl flex items-center justify-between px-4 py-3">
              <h1 className="text-lg font-bold">⚽ FutStocks</h1>
              <div className="flex gap-2 text-sm">
                <span className="border rounded px-3 py-1 bg-white">Balance: {state.balance}c</span>
                <span className="border rounded px-3 py-1 bg-white">Net Worth: {netWorth}c</span>
              </div>
            </div>
            <nav className="mx-auto max-w-6xl px-4 pb-3 flex gap-2">
              <Tab label="Market" value="market" active={tab} onClick={setTab} />
              <Tab label="Portfolio" value="portfolio" active={tab} onClick={setTab} />
              <Tab label="Fixtures" value="fixtures" active={tab} onClick={setTab} />
              <Tab label="Transactions" value="tx" active={tab} onClick={setTab} />
            </nav>
          </header>

          <main className="mx-auto max-w-6xl p-4">
            {tab==="market" && (
              <MarketGrid fixtures={state.fixtures} players={state.players} teams={state.teams} onBuy={buyCard} />
            )}

            {tab==="portfolio" && (
              <section className="grid gap-3">
                {portfolioWithMeta.length===0 && <EmptyCard title="No cards yet" subtitle="Buy some players from the Market." />}
                {portfolioWithMeta.map(c=>(
                  <div key={c.id} className="border rounded-lg p-3 bg-white">
                    <div className="flex items-center justify-between">
                      <div className="text-sm">
                        {c.player?.name} <span className="text-slate-500 text-xs">({c.player?.pos} • {c.player?.team})</span>
                      </div>
                      <div className="text-sm">{c.current}c <span className={`${c.current-c.invested>=0?"text-emerald-600":"text-rose-600"}`}>({(c.roi*100).toFixed(1)}%)</span></div>
                    </div>
                    <div className="text-xs text-slate-500">Fixture: {c.fixture ? `${fmtTeam(c.fixture.home,byId.team)} vs ${fmtTeam(c.fixture.away,byId.team)}` : "-"}</div>
                    {!c.soldAt && c.fixture?.status==="finished" && (
                      <button onClick={()=>sellCard(c.id)} className="mt-2 px-3 py-1 bg-slate-900 text-white rounded text-sm">Sell</button>
                    )}
                    {c.soldAt && (
                      <div className="mt-2 text-xs text-slate-600">Sold @ {c.soldAt}c</div>
                    )}
                  </div>
                ))}
              </section>
            )}

            {tab==="fixtures" && (
              <section className="grid gap-3">
                {state.fixtures.map(f=>(
                  <div key={f.id} className="border rounded-lg p-3 bg-white">
                    <div className="flex items-center justify-between">
                      <div className="text-sm font-semibold">{fmtTeam(f.home,byId.team)} vs {fmtTeam(f.away,byId.team)}</div>
                      <div className="text-xs text-slate-600">{f.status==="finished" ? `FT ${f.result?.homeGoals}:${f.result?.awayGoals}` : `Kickoff ${fmtTime(f.kickoff)}`}</div>
                    </div>
                    {f.status==="upcoming" && (
                      <button onClick={()=>resolveFixture(f.id)} className="mt-2 px-3 py-1 bg-emerald-600 text-white rounded text-sm">Resolve</button>
                    )}
                  </div>
                ))}
              </section>
            )}

            {tab==="tx" && (
              <section className="grid gap-2">
                {state.tx.length===0 && <EmptyCard title="No transactions" subtitle="Buys and sells will appear here." />}
                {state.tx.map(t=>(
                  <div key={t.id} className="border rounded p-2 bg-white text-sm">
                    <span className="font-semibold">{t.type}</span> · {t.amount}c · <span className="text-slate-500">{new Date(t.ts).toLocaleString()}</span>
                  </div>
                ))}
              </section>
            )}
          </main>
        </div>
      );
    }

    // --------------------------- Mount ---------------------------
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
