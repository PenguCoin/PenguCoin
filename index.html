    // --------------------------- Scoring & Simulation ---------------------------
    function scoreForPlayer(stat, pos, teamResult){
      let s=0;
      if(teamResult==="W") s+=10; else if(teamResult==="D") s+=3;
      if(stat.minutes>=90) s+=6; else if(stat.minutes>=60) s+=4; else if(stat.minutes>0) s+=2;
      const goalPts = pos===POS.FWD?8: pos===POS.MID?10: 12;
      s += goalPts*(stat.goals||0);
      s += 6*(stat.assists||0);
      if((pos===POS.DEF||pos===POS.GK) && stat.minutes>=60 && stat.cleanSheet) s+=8;
      if(pos===POS.GK){ s+=Math.floor((stat.saves||0)/3); s+=8*(stat.penSaves||0); }
      s -= 3*(stat.yellow||0); s -= 7*(stat.red||0);
      s -= 6*(stat.ownGoals||0); s -= 5*(stat.penMiss||0); s -= 5*(stat.penConceded||0);
      return s;
    }
    const newValueFromScore = (base,score)=> Math.round(clamp(base*(1+score/50), base*0.2, base*3));

    function randomStatline(pos, gf, ga){
      const minutes = chance(0.1)?0: chance(0.15)?randInt(1,59): chance(0.35)?randInt(60,89): 90;
      let goals=0,assists=0,yellow=0,red=0,ownGoals=0,penMiss=0,penSaves=0,saves=0,penConceded=0;
      if(minutes>0){
        if(pos===POS.FWD) goals = chance(0.35)?1: chance(0.12)?2: chance(0.03)?3: 0;
        if(pos===POS.MID) goals = chance(0.18)?1: chance(0.05)?2: 0;
        if(pos===POS.DEF) goals = chance(0.08)?1: 0;
        assists = chance(0.25)?1: chance(0.07)?2: 0;
        yellow = chance(0.15)?1:0; red = yellow? (chance(0.05)?1:0) : (chance(0.02)?1:0);
        ownGoals = chance(0.01)?1:0; penMiss = chance(0.03)?1:0;
        if(pos===POS.GK){ saves=randInt(0,9); penSaves=chance(0.05)?1:0; }
        else if(pos===POS.DEF){ penConceded=chance(0.03)?1:0; }
        else if(pos===POS.MID){ penConceded=chance(0.02)?1:0; }
        else { penConceded=chance(0.01)?1:0; }
      }
      const cleanSheet = minutes>=60 && ga===0;
      return { minutes, goals, assists, yellow, red, ownGoals, penMiss, penSaves, saves, penConceded, cleanSheet };
    }

                </div>
              </div>
              <div className="grid gap-2 md:grid-cols-2">
                {[{label:"Home", ids:f.homePlayers},{label:"Away", ids:f.awayPlayers}].map(col=>(
                  <div key={col.label} className="rounded-lg border bg-slate-50 p-3">
                    <div className="mb-2 text-xs font-semibold text-slate-600">{col.label} Players</div>
                    <div className="space-y-2">
                      {col.ids.map(pid=>{
                        const p = players.find(x=>x.id===pid);
                        if(!p) return null;
                        const teamName = (teamById[p.team]?.name || "").toLowerCase();
                        const show = !q
                          || p.name.toLowerCase().includes(q)
                          || p.team.toLowerCase().includes(q)
                          || teamName.includes(q)
                          || p.pos.toLowerCase().includes(q);
                        if(!show) return null;
                        const cost = Math.round(p.basePrice * sharePct);
                        const total = cost + TX_FEE;
                        const disabled = balance < total;
                        return (
                          <div key={pid} className="flex items-center justify-between rounded-xl bg-white px-3 py-2 shadow-sm ring-1 ring-slate-200">
                            <div className="min-w-0">
                              <div className="text-sm font-semibold truncate">{p.name}</div>
                              <div className="text-xs text-slate-500 truncate">{p.pos} • {p.team} • Base {$fmt(p.basePrice)}</div>
                            </div>
                            <div className="text-right">
                              <div className="text-[10px] text-slate-500 mb-1">+ fee {$fmt(TX_FEE)}</div>
                              <button onClick={()=>onBuy(p.id, f.id, 1, sharePct)}
                                disabled={disabled}
                                className={`px-3 py-1.5 rounded text-sm press-anim ${disabled? "bg-slate-300 text-slate-500 cursor-not-allowed":"bg-slate-900 text-white"}`}>
                                Buy {Math.round(sharePct*100)}% · {$fmt(total)}
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function PlayerStatRow({ player, stats, onEdit, onQuickSell, canQuickSell }){
      const sixty = (stats?.minutes ?? 0) >= 60;
      return (
        <div className="rounded-xl bg-white p-3 shadow-sm ring-1 ring-slate-200">
          <div className="mb-2 flex items-center justify-between">
            <div>
              <div className="text-sm font-semibold">{player?.name}</div>
              <div className="text-xs text-slate-500">{player?.pos} • {player?.team}</div>
            </div>
            {canQuickSell && (
              <button onClick={onQuickSell} className="rounded-lg bg-slate-900 px-3 py-1.5 text-xs font-semibold text-white press-anim">
                Quick Sell (all shares) − {$fmt(TX_FEE)} each
              </button>
            )}
          </div>
          <div className="grid grid-cols-2 gap-3 md:grid-cols-4">
            <NumField label="Min" value={stats.minutes??0} onChange={(v)=>onEdit({ minutes: clamp(v,0,120) })}/>
            <NumField label="Goals" value={stats.goals??0} onChange={(v)=>onEdit({ goals: Math.max(0,v) })}/>
            <NumField label="Assists" value={stats.assists??0} onChange={(v)=>onEdit({ assists: Math.max(0,v) })}/>
            <ToggleField label="CleanSheet" value={!!stats.cleanSheet} onChange={(v)=>onEdit({ cleanSheet: !!v })}/>
            <NumField label="Yellow" value={stats.yellow??0} onChange={(v)=>onEdit({ yellow: Math.max(0,v) })}/>
            <NumField label="Red" value={stats.red??0} onChange={(v)=>onEdit({ red: Math.max(0,v) })}/>
            <NumField label="OwnGoals" value={stats.ownGoals??0} onChange={(v)=>onEdit({ ownGoals: Math.max(0,v) })}/>
            <NumField label="PenMiss" value={stats.penMiss??0} onChange={(v)=>onEdit({ penMiss: Math.max(0,v) })}/>
            {player?.pos===POS.GK && (
              <>
                <NumField label="Saves" value={stats.saves??0} onChange={(v)=>onEdit({ saves: Math.max(0,v) })}/>
                <NumField label="PenSaves" value={stats.penSaves??0} onChange={(v)=>onEdit({ penSaves: Math.max(0,v) })}/>
              </>
            )}
            <NumField label="PenConc" value={stats.penConceded??0} onChange={(v)=>onEdit({ penConceded: Math.max(0,v) })}/>
          </div>
          <div className="mt-2 text-xs text-slate-500">60+ minutes? {sixty ? "Yes":"No"}</div>
        </div>
      );
    }

    function FixtureCard({ fixture, playersById, teamById, onResolve, onEditStat, ownedByPlayerForFixture, onQuickSell }){
      const isFinished = fixture.status === "finished";
      return (
        <div className="rounded-2xl border bg-white p-4 shadow-sm">
          <div className="mb-3 flex items-center justify-between">
            <div>
              <div className="text-sm font-semibold">{fmtTeam(fixture.home,teamById)} <span className="text-slate-400">vs</span> {fmtTeam(fixture.away,teamById)}</div>
              <div className="text-xs text-slate-500">{fixture.label} · {fixture.day} · {fmtTime(fixture.kickoff)}</div>
            </div>
            <div className="flex items-center gap-2">
              {isFinished ? (
                <span className="rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-semibold text-emerald-700">
                  FT {fixture.result?.homeGoals ?? "-"}:{fixture.result?.awayGoals ?? "-"}
                </span>
              ) : (
                <span className="rounded-full bg-amber-100 px-2.5 py-1 text-xs font-semibold text-amber-700">Upcoming</span>
              )}
              {!isFinished && (
                <button onClick={onResolve} className="px-3 py-1.5 bg-emerald-600 text-white rounded text-sm press-anim">Resolve</button>
              )}
            </div>
          </div>

          {isFinished ? (
            <div className="grid grid-cols-1 gap-3 md:grid-cols-2">
              {[{label:"Home",ids:fixture.homePlayers},{label:"Away",ids:fixture.awayPlayers}].map(grp=>(
                <div key={grp.label} className="rounded-xl border bg-slate-50/60 p-3">
                  <div className="mb-2 text-xs font-semibold text-slate-600">{grp.label} Player Stats</div>
                  <div className="space-y-2">
                    {grp.ids.map(pid=>(
                      <PlayerStatRow
                        key={pid}
                        player={playersById[pid]}
                        stats={fixture.result?.stats?.[pid] || {}}
                        onEdit={(patch)=>onEditStat(pid, patch)}
                        canQuickSell={ownedByPlayerForFixture(pid, fixture.id).length > 0}
                        onQuickSell={()=> onQuickSell(pid, fixture.id)}
                      />
                    ))}
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="rounded-xl border border-dashed p-4 text-sm text-slate-500">
              Stats available after full-time. You can edit stats after resolving.
            </div>
          )}
        </div>
      );
    }

    // --------------------------- Main App ---------------------------
    function App(){
      const [state,setState] = useState(()=> loadState() || ({
        balance: 1000,
        players: PLAYERS,
        teams: TEAMS,
        fixtures: FIXTURES,
        portfolio: [], // {id, playerId, fixtureId, boughtPrice, sharePct, quantity, soldAt}
        tx: [],
      }));
      const [tab,setTab] = useState("market");
      const [fixtureFilter,setFixtureFilter] = useState("all");
      const [query,setQuery] = useState("");
      const [toast, setToast] = useState(null); // {message, ts}

      useEffect(()=> saveState(state), [state]);

      // clear stale toasts
      useEffect(()=>{
        if(!toast) return;
        const t = setTimeout(()=> setToast(null), 1200);
        return ()=> clearTimeout(t);
      }, [toast]);

      const byId = useMemo(()=>({
        player: Object.fromEntries(state.players.map(p=>[p.id,p])),
        team: Object.fromEntries(state.teams.map(t=>[t.id,t])),
        fixture: Object.fromEntries(state.fixtures.map(f=>[f.id,f])),
      }),[state.players,state.teams,state.fixtures]);

      function teamResultForPlayer(pid, fixture){
        const isHome = fixture.homePlayers.includes(pid);
        const { homeGoals, awayGoals } = fixture.result || {};
        if(homeGoals==null || awayGoals==null) return "D";
        if(homeGoals===awayGoals) return "D";
        return (isHome? homeGoals>awayGoals : awayGoals>homeGoals) ? "W":"L";
      }

      // BUY with sharePct, includes fee
      function buyCard(playerId, fixtureId, qty=1, sharePct=1.0){
        const p = byId.player[playerId]; const f = byId.fixture[fixtureId];
        if(!p || !f || f.status!=="upcoming") return;
        const itemCost = Math.round(p.basePrice * sharePct);
        const total = itemCost * qty + TX_FEE; // include fee
        if(state.balance < total) return;

        const item = {
          id:`card_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
          playerId, fixtureId,
          boughtPrice: p.basePrice,
          sharePct, quantity: qty,
          soldAt: null
        };
        setState(s=>({
          ...s,
          balance: s.balance - total,
          portfolio: [item, ...s.portfolio],
          tx: [{ id:`tx_${Date.now()}`, type:"BUY", amount:-total, ts:new Date().toISOString(), meta:{ playerId, fixtureId, qty, sharePct, fee: TX_FEE } }, ...s.tx],
        }));
        setToast({ message:`Purchased ${Math.round(sharePct*100)}% of ${p.name} (${f.label})`, ts: Date.now() });
      }

      // SELL (single card) — payout proportional to sharePct, minus fee
      function sellCard(cardId){
        const card = state.portfolio.find(c=>c.id===cardId);
        if(!card || card.soldAt) return;
        const player = byId.player[card.playerId];
        const fixture = byId.fixture[card.fixtureId];
        if(!fixture || fixture.status!=="finished") return;
        const stat = fixture.result?.stats?.[card.playerId] || {};
        const teamRes = teamResultForPlayer(card.playerId, fixture);
        const score = scoreForPlayer(stat, player.pos, teamRes);
        const unit = newValueFromScore(player.basePrice, score);
        const gross = Math.round(unit * card.sharePct) * card.quantity;
        const net = Math.max(0, gross - TX_FEE);

        setState(s=>({
          ...s,
          balance: s.balance + net,
          portfolio: s.portfolio.map(c=> c.id===cardId ? { ...c, soldAt: net } : c),
          tx: [{ id:`tx_${Date.now()}`, type:"SELL", amount: net, ts:new Date().toISOString(), meta:{ cardId, fee: TX_FEE, gross } }, ...s.tx],
        }));
        setToast({ message:`Sold ${Math.round(card.sharePct*100)}% of ${player.name} (${fixture.label})`, ts: Date.now() });
      }

      // QUICK SELL: sell all unsold cards for a specific (playerId, fixtureId)
      function quickSellByPlayerFixture(playerId, fixtureId){
        const f = byId.fixture[fixtureId];
        if(!f || f.status!=="finished") return;
        const player = byId.player[playerId];
        const stat = f.result?.stats?.[playerId] || {};
        const teamRes = teamResultForPlayer(playerId, f);
        const score = scoreForPlayer(stat, player.pos, teamRes);
        const unit = newValueFromScore(player.basePrice, score);

        let grossTotal = 0;
        let netCredit = 0;
        const nextPortfolio = state.portfolio.map(c=>{
          if(c.playerId===playerId && c.fixtureId===fixtureId && !c.soldAt){
            const gross = Math.round(unit * c.sharePct) * c.quantity;
            grossTotal += gross;
            const net = Math.max(0, gross - TX_FEE);
            netCredit += net;
            return { ...c, soldAt: net };
          }
          return c;
        });

        if(netCredit === 0 && grossTotal === 0) return;

        setState(s=>({
          ...s,
          balance: s.balance + netCredit,
          portfolio: nextPortfolio,
          tx: [{ id:`tx_${Date.now()}`, type:"SELL", amount: netCredit, ts:new Date().toISOString(), meta:{ playerId, fixtureId, bulk:true, feeEach: TX_FEE, grossTotal } }, ...s.tx],
        }));
        setToast({ message:`Sold all shares of ${player.name} (${f.label})`, ts: Date.now() });
      }

      function ownedByPlayerForFixture(playerId, fixtureId){
        return state.portfolio.filter(c=> c.playerId===playerId && c.fixtureId===fixtureId && !c.soldAt);
      }

      function resolveFixture(fixtureId){
        const idx = state.fixtures.findIndex(f=>f.id===fixtureId);
        if(idx===-1) return;
        const f = state.fixtures[idx];
        if(f.status==="finished") return;

        const homeGoals = randInt(0,4);
        const awayGoals = randInt(0,4);
        const stats = {};
        for(const pid of [...f.homePlayers, ...f.awayPlayers]){
          const p = byId.player[pid];
          const isHome = f.homePlayers.includes(pid);
          const gf = isHome ? homeGoals : awayGoals;
          const ga = isHome ? awayGoals : homeGoals;
          stats[pid] = randomStatline(p.pos, gf, ga);
        }
        const updated = { ...f, status:"finished", result:{ homeGoals, awayGoals, stats } };
        setState(s=>({ ...s, fixtures: s.fixtures.map((fx,i)=> i===idx? updated : fx) }));
      }

      function resolveAllUpcoming(){
        setState(s => {
          const playerById = Object.fromEntries(s.players.map(p => [p.id, p]));
          const nextFixtures = s.fixtures.map(f => {
            if (f.status !== "upcoming") return f;
            const homeGoals = randInt(0,4);
            const awayGoals = randInt(0,4);
            const stats = {};
            for (const pid of [...f.homePlayers, ...f.awayPlayers]) {
              const p = playerById[pid];
              const isHome = f.homePlayers.includes(pid);
              const gf = isHome ? homeGoals : awayGoals;
              const ga = isHome ? awayGoals : homeGoals;
              stats[pid] = randomStatline(p.pos, gf, ga);
            }
            return { ...f, status: "finished", result: { homeGoals, awayGoals, stats } };
          });
          return { ...s, fixtures: nextFixtures };
        });
      }

      function editStat(fixtureId, playerId, patch){
        setState(s=>({
          ...s,
          fixtures: s.fixtures.map(f=>{
            if(f.id !== fixtureId || !f.result) return f;
            const nextStats = { ...(f.result.stats || {}) };
            nextStats[playerId] = { ...(nextStats[playerId] || {}), ...patch };
            return { ...f, result: { ...f.result, stats: nextStats } };
          })
        }));
      }

      // Derived portfolio values (using potential gross for open cards; sells store net)
      const portfolioWithMeta = state.portfolio.map(c=>{
        const player = byId.player[c.playerId];
        const fixture = byId.fixture[c.fixtureId];
        const invested = Math.round(c.boughtPrice * c.sharePct) * c.quantity + TX_FEE; // buy included fee
        let current = Math.round(c.boughtPrice * c.sharePct) * c.quantity; // default pre-match
        if(fixture && fixture.status==="finished"){
          const stat = fixture.result?.stats?.[c.playerId] || {};
          const teamRes = teamResultForPlayer(c.playerId, fixture);
          const score = scoreForPlayer(stat, player.pos, teamRes);
          const unit = newValueFromScore(player.basePrice, score);
          current = Math.round(unit * c.sharePct) * c.quantity; // gross (fee only on sell)
        }
        const roi = invested ? (current - invested) / invested : 0;
        return { ...c, player, fixture, invested, current, roi };
      });
      const portfolioValueOpen = portfolioWithMeta.filter(c=>!c.soldAt).reduce((s,c)=>s+c.current,0);
      const netWorth = state.balance + portfolioValueOpen;

      // Live updates via optional WebSocket (server not required)
      useEffect(()=>{
        let ws;
        try {
          ws = new WebSocket('ws://localhost:4000/live');
          ws.onmessage = (evt) => {
            const msg = JSON.parse(evt.data);
            if (msg.type === 'fixture_finished') {
              setState(s => {
                const idx = s.fixtures.findIndex(f => f.id === msg.fixtureId);
                if (idx === -1) return s;
                const f = s.fixtures[idx];
                const result = msg.result?.stats ? msg.result : {
                  ...msg.result,
                  stats: (() => {
                    const stats = {};
                    const playerById = Object.fromEntries(s.players.map(p => [p.id, p]));
                    for (const pid of [...f.homePlayers, ...f.awayPlayers]) {
                      const p = playerById[pid];
                      const isHome = f.homePlayers.includes(pid);
                      const gf = isHome ? msg.result.homeGoals : msg.result.awayGoals;
                      const ga = isHome ? msg.result.awayGoals : msg.result.homeGoals;
                      stats[pid] = randomStatline(p.pos, gf, ga);
                    }
                    return stats;
                  })()
                };
                const updated = { ...f, status: 'finished', result };
                return { ...s, fixtures: s.fixtures.map((fx,i)=> i===idx ? updated : fx) };
              });
            }
          };
        } catch {}
        return ()=> { try { ws && ws.close(); } catch {} };
      }, []);

      // --------------------------- UI ---------------------------
      return (
        <div className="min-h-screen">
          <header className="sticky top-0 z-10 border-b bg-white">
            <div className="mx-auto max-w-7xl flex items-center justify-between px-4 py-3">
              <div className="flex items-center gap-3">
                <span className="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 text-white font-bold">FS</span>
                <h1 className="text-lg sm:text-xl font-bold">FutStocks — Matchweek 3 (Fractional)</h1>
              </div>
              <div className="flex items-center gap-2 text-sm">
                <span className="border rounded px-3 py-1 bg-white">Balance: {$fmt(state.balance)}</span>
                <span className="border rounded px-3 py-1 bg-white">Net Worth: {$fmt(netWorth)}</span>
                <button onClick={()=>{ if(confirm("Reset all progress?")) setState({ balance:1000, players:PLAYERS, teams:TEAMS, fixtures:FIXTURES, portfolio:[], tx:[] }) }}
                        className="px-3 py-1.5 bg-slate-900 text-white rounded press-anim">Reset</button>
              </div>
            </div>
            <nav className="mx-auto max-w-7xl px-4 pb-3 flex gap-2">
              <Tab label="Market" value="market" active={tab} onClick={setTab}/>
              <Tab label="Portfolio" value="portfolio" active={tab} onClick={setTab}/>
              <Tab label="Fixtures" value="fixtures" active={tab} onClick={setTab}/>
              <Tab label="Rules" value="rules" active={tab} onClick={setTab}/>
              <Tab label="Transactions" value="tx" active={tab} onClick={setTab}/>
            </nav>
          </header>

          <main className="mx-auto max-w-7xl p-4">
            {tab==="market" && (
              <section>
                <div className="mb-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                  <div className="flex items-center gap-2">
                    <select value={fixtureFilter} onChange={(e)=>setFixtureFilter(e.target.value)}
                            className="rounded-xl border bg-white px-3 py-2 text-sm shadow-sm">
                      <option value="all">All upcoming fixtures</option>
                      {state.fixtures.filter(f=>f.status==="upcoming").map(f=>(
                        <option key={f.id} value={f.id}>
                          {f.label} — {f.day}
                        </option>
                      ))}
                    </select>
                    <input value={query} onChange={(e)=>setQuery(e.target.value)}
                           placeholder="Search player/team/pos..."
                           className="w-64 rounded-xl border bg-white px-3 py-2 text-sm shadow-sm"/>
                  </div>
                  <button onClick={resolveAllUpcoming}
                          className="rounded-xl bg-emerald-600 px-3 py-2 text-sm font-semibold text-white shadow hover:bg-emerald-700 press-anim">
                    Resolve ALL upcoming
                  </button>
                </div>
                <MarketGrid fixtures={state.fixtures} players={state.players} teams={state.teams}
                            filterFixtureId={fixtureFilter} query={query} onBuy={buyCard} balance={state.balance}/>
              </section>
            )}

            {tab==="portfolio" && (
              <section className="space-y-4">
                <div className="grid grid-cols-1 gap-3 sm:grid-cols-3">
                  <div className="rounded-2xl border bg-white p-4 shadow-sm">
                    <div className="text-xs text-slate-500">Balance</div>
                    <div className="text-xl font-semibold">{$fmt(state.balance)}</div>
                  </div>
                  <div className="rounded-2xl border bg-white p-4 shadow-sm">
                    <div className="text-xs text-slate-500">Open Portfolio (gross)</div>
                    <div className="text-xl font-semibold">{$fmt(portfolioValueOpen)}</div>
                  </div>
                  <div className="rounded-2xl border bg-white p-4 shadow-sm">
                    <div className="text-xs text-slate-500">Net Worth</div>
                    <div className="text-xl font-semibold">{$fmt(netWorth)}</div>
                  </div>
                </div>
                <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                  {portfolioWithMeta.length===0 && <EmptyCard title="No cards yet" subtitle="Buy cards from the Market before kickoff." />}
                  {portfolioWithMeta.map(c=>(
                    <div key={c.id} className="rounded-2xl border bg-white p-4 shadow-sm">
                      <div className="flex items-center justify-between">
                        <div className="min-w-0">
                          <div className="text-sm text-slate-600 truncate">
                            {c.player?.name} <span className="text-xs text-slate-500">({c.player?.pos} • {c.player?.team})</span>
                          </div>
                          <div className="text-xs text-slate-500 truncate">
                            {c.fixture ? `${c.fixture.label} · ${c.fixture.day}` : "-"}
                          </div>
                        </div>
                        <div className="text-right">
                          <div className="text-sm">
                            Bought @ <span className="font-semibold">{$fmt(Math.round(c.boughtPrice*c.sharePct)*c.quantity)}</span>
                            <span className="text-xs text-slate-500"> ({Math.round(c.sharePct*100)}%)</span>
                          </div>
                          <div className="text-[10px] text-slate-500">+ buy fee {$fmt(TX_FEE)} (already included)</div>

                          {!c.soldAt ? (
                            <>
                              <div className="text-sm">Current: <span className="font-semibold">{$fmt(c.current)}</span></div>
                              <div className={`text-sm ${c.current-c.invested>=0?"text-emerald-600":"text-rose-600"}`}>ROI (gross): {(c.roi*100).toFixed(1)}%</div>
                            </>
                          ) : (
                            <div className={`text-sm ${(c.soldAt - c.invested)>=0?"text-emerald-600":"text-rose-600"}`}>
                              Realized ROI: {(((c.soldAt - c.invested) / c.invested) * 100).toFixed(1)}%
                            </div>
                          )}
                        </div>
                      </div>
                      <div className="mt-3 flex items-center justify-between">
                        <div className="text-xs text-slate-500">
                          {c.fixture?.status==="finished" ? "Match finished" : "Locked until full-time"}
                        </div>
                        <div className="flex gap-2">
                          {!c.soldAt && c.fixture?.status==="finished" && (
                            <button onClick={()=>sellCard(c.id)}
                              className="rounded-xl bg-slate-900 px-3 py-1.5 text-sm font-semibold text-white shadow hover:bg-slate-800 press-anim">
                              Sell (− {$fmt(TX_FEE)})
                            </button>
                          )}
                          {c.soldAt && (
                            <span className="rounded-xl bg-slate-100 px-3 py-1.5 text-sm font-semibold text-slate-700">
                              Sold @ {$fmt(c.soldAt)}
                            </span>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </section>
            )}

            {tab==="fixtures" && (
              <section className="space-y-5">
                {state.fixtures.map(f=>(
                  <FixtureCard key={f.id}
                    fixture={f}
                    playersById={byId.player}
                    teamById={byId.team}
                    onResolve={()=>resolveFixture(f.id)}
                    onEditStat={(pid,patch)=>editStat(f.id, pid, patch)}
                    ownedByPlayerForFixture={ownedByPlayerForFixture}
                    onQuickSell={quickSellByPlayerFixture}
                  />
                ))}
              </section>
            )}

            {tab==="rules" && (
              <div className="rounded-2xl border bg-white p-6 shadow-sm">
                <h2 className="mb-3 text-lg font-bold">How it works (Fractional Model B + Fees)</h2>
                <ol className="list-decimal space-y-2 pl-5 text-sm text-slate-700">
                  <li>Pick a player in an upcoming fixture and choose a <strong>share</strong> (25/50/75/100%).</li>
                  <li>Cost = Base × Share <strong>+ $20 fee</strong> per Buy.</li>
                  <li>After the match, value updates by performance; <strong>Sell payout = New Value × Share − $20 fee</strong>.</li>
                  <li>Profits/losses are unrealized until you press <em>Sell</em>.</li>
                  <li>Net Worth = Balance + Gross value of unsold cards.</li>
                </ol>
                <h3 className="mt-5 text-base font-semibold">Base Price Tiers</h3>
                <p className="text-sm text-slate-700">Cards use one of: $150, $200, $250, $300 based on player tier.</p>
              </div>
            )}

            {tab==="tx" && (
              <section className="space-y-2">
                {state.tx.length===0 ? (
                  <EmptyCard title="No transactions yet" subtitle="Buys and sells will appear here." />
                ) : (
                  <div className="overflow-hidden rounded-2xl border bg-white shadow-sm">
                    <table className="w-full text-sm">
                      <thead className="bg-slate-50 text-left text-slate-600">
                        <tr>
                          <th className="px-4 py-3">Time</th>
                          <th className="px-4 py-3">Type</th>
                          <th className="px-4 py-3">Amount</th>
                          <th className="px-4 py-3">Meta</th>
                        </tr>
                      </thead>
                      <tbody>
                        {state.tx.map(t=>(
                          <tr key={t.id} className="border-t">
                            <td className="px-4 py-3 text-slate-500">{new Date(t.ts).toLocaleString()}</td>
                            <td className="px-4 py-3 font-semibold">{t.type}</td>
                            <td className={`px-4 py-3 ${t.amount>=0?"text-emerald-700":"text-rose-700"}`}>{$fmt(t.amount)}</td>
                            <td className="px-4 py-3 text-slate-500 text-xs">{JSON.stringify(t.meta)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </section>
            )}
          </main>

          {toast && <Toast show>{toast.message}</Toast>}
        </div>
      );
    }

    // --------------------------- Mount ---------------------------
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
