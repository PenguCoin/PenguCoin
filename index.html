<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PudgyPenguin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 47.4% 11.2%;
        --primary: 204 100% 43%;
        --radius: 12px;
      }
      html {
        scroll-behavior: smooth;
      }
      @keyframes bubble {
        0% { transform: scale(1); opacity: 0.2; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-bubble {
        animation: bubble 1.8s ease-in-out forwards;
      }
      .fade-in {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s ease-out forwards;
      }
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .dark-mode {
        background-color: #1e293b;
        color: #f1f5f9;
      }
      .dark-mode .bg-white {
        background-color: #334155 !important;
      }
      .dark-mode .text-gray-600 {
        color: #cbd5e1 !important;
      }
      .dark-mode .text-gray-700 {
        color: #e2e8f0 !important;
      }
      .dark-mode .bg-blue-100 {
        background-color: #1e293b;
      }
    </style>
    <script>
      window.addEventListener('scroll', () => {
        document.querySelectorAll('.fade-in').forEach(el => {
          const rect = el.getBoundingClientRect();
          if (rect.top < window.innerHeight - 100) {
            el.style.opacity = 1;
            el.style.transform = 'translateY(0)';
          }
        });
      });

      function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    </script>
  </head>
  <body class="bg-gradient-to-b from-blue-100 to-white text-gray-900 font-sans">
    <!-- Header -->
    <header class="bg-white shadow sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-800">🐧 Pudgy Penguins</h1>
        <nav class="space-x-6 font-medium">
          <a href="#home" class="hover:text-blue-600">Home</a>
          <a href="#articles" class="hover:text-blue-600">Articles</a>
          <a href="#about" class="hover:text-blue-600">About</a>
          <a href="#contact" class="hover:text-blue-600">Contact</a>
        </nav>
        <div class="flex items-center gap-3">
          <button onclick="toggleDarkMode()" class="bg-gray-200 px-3 py-1 rounded text-sm hover:bg-gray-300">🌓 Toggle</button>
          <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-all duration-200">Connect Wallet</button>
        </div>
      </div>
    </header>
