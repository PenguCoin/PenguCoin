<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutStocks — Fantasy ROI (Single‑file)</title>

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              bg: "#eef2f7",
              card: "#ffffff",
              dark: "#0f172a",
              accent: "#1e293b"
            }
          }
        }
      }
    }
  </script>

  <!-- React 18 UMD + Babel for in‑browser JSX -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* micro-anim helpers (no external libs) */
    .pressable:active { transform: translateY(1px) scale(0.99); }
    .fade-in { animation: fade-in .25s ease-out; }
    @keyframes fade-in { from { opacity:0; transform: translateY(4px) } to { opacity:1; transform:none } }
    .pop { animation: pop .25s ease-out; }
    @keyframes pop { from { transform: scale(.97); } to { transform: scale(1); } }
    .coin-float { animation: coin-float 700ms ease-out forwards; pointer-events:none; position:fixed; }
    @keyframes coin-float {
      0%   { opacity: 0; transform: translateY(8px) scale(.9) }
      20%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-38px) scale(1.1) }
    }
    /* Confetti container */
    #confetti-root { position: fixed; inset: 0; pointer-events: none; }
  </style>
</head>
<body class="min-h-screen bg-brand-bg text-slate-900">
  <div id="root"></div>
  <div id="confetti-root"></div>

  <!-- App Code -->
  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    // --------------------------- Helpers & Types ---------------------------
    const LS_KEY = "futstocks_state_v1";
    const POS = { GK: "GK", DEF: "DEF", MID: "MID", FWD: "FWD" };

    const clamp = (v,min,max) => Math.min(max, Math.max(min, v));
    const randInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
    const chance = (p) => Math.random() < p;
    const vibe = (ms=15) => { if (navigator?.vibrate) try{ navigator.vibrate(ms); } catch{} };

    // tiny sfx helper (safe if file missing)
    const playSound = (id) => {
      const el = document.getElementById(id);
      if (!el) return;
      try { el.currentTime = 0; el.play(); } catch {}
    };

    // confetti (vanilla, lightweight)
    function blastConfetti(count=26){
      const root = document.getElementById("confetti-root");
      if(!root) return;
      for(let i=0;i<count;i++){
        const p = document.createElement("div");
        p.style.position="absolute";
        p.style.top="0";
        p.style.left = (50 + (Math.random()*40-20))+"%";
        p.style.width="8px"; p.style.height="12px";
        p.style.background = ["#FFD166","#80ED99","#74C0FC","#FCA5A5","#C4B5FD"][Math.floor(Math.random()*5)];
        p.style.borderRadius="3px";
        p.style.transform=`translateY(-10px) rotate(${Math.random()*360}deg)`;
        p.style.opacity="0.9";
        const d = 900 + Math.random()*600;
        const dx = (Math.random()*2-1)*160;
        p.animate(
          [
            { transform:`translate(0,-20px) rotate(0deg)`, opacity:0 },
            { transform:`translate(${dx/2}px, 240px) rotate(180deg)`, opacity:1, offset: 0.6 },
            { transform:`translate(${dx}px, 520px) rotate(360deg)`, opacity:0 }
          ],
          { duration: d, easing: "cubic-bezier(.2,.7,.2,1)" }
        ).onfinish = () => p.remove();
        root.appendChild(p);
      }
    }

    // --------------------------- Seed Data ---------------------------
    const TEAMS = [
      { id: "FCK", name: "FC København" },
      { id: "MUN", name: "Manchester United" },
      { id: "RIV", name: "River Plate" },
      { id: "AJX", name: "Ajax" },
      { id: "SEV", name: "Sevilla" },
      { id: "LAZ", name: "Lazio" },
      { id: "OLY", name: "Olympiacos" },
      { id: "SAN", name: "Santos" },
    ];

    const PLAYERS = [
      { id: "p1",  name: "Kamil Grabara",     pos: POS.GK,  team: "FCK", basePrice: 85 },
      { id: "p2",  name: "Rasmus Falk",       pos: POS.MID, team: "FCK", basePrice: 90 },
      { id: "p3",  name: "Roony Bardghji",    pos: POS.FWD, team: "FCK", basePrice: 120 },
      { id: "p4",  name: "Marcus Rashford",   pos: POS.FWD, team: "MUN", basePrice: 140 },
      { id: "p5",  name: "Bruno Fernandes",   pos: POS.MID, team: "MUN", basePrice: 135 },
      { id: "p6",  name: "Lisandro Martínez", pos: POS.DEF, team: "MUN", basePrice: 95 },
      { id: "p7",  name: "Franco Armani",     pos: POS.GK,  team: "RIV", basePrice: 80 },
      { id: "p8",  name: "Enzo Pérez",        pos: POS.MID, team: "RIV", basePrice: 88 },
      { id: "p9",  name: "Santiago Simón",    pos: POS.FWD, team: "RIV", basePrice: 98 },
      { id: "p10", name: "Brian Brobbey",     pos: POS.FWD, team: "AJX", basePrice: 110 },
      { id: "p11", name: "Steven Berghuis",   pos: POS.MID, team: "AJX", basePrice: 100 },
      { id: "p12", name: "Jurrien Timber*",   pos: POS.DEF, team: "AJX", basePrice: 92 },
      { id: "p13", name: "Youssef En‑Nesyri", pos: POS.FWD, team: "SEV", basePrice: 112 },
      { id: "p14", name: "Luis Alberto",      pos: POS.MID, team: "LAZ", basePrice: 105 },
      { id: "p15", name: "K. Fortounis",      pos: POS.MID, team: "OLY", basePrice: 96 },
      { id: "p16", name: "Marcos Leonardo",   pos: POS.FWD, team: "SAN", basePrice: 108 },
    ];

    const hoursFromNow = (h) => { const t = new Date(); t.setHours(t.getHours()+h); return t.toISOString(); };
    const FIXTURES = [
      { id:"f1", home:"FCK", away:"MUN", kickoff: hoursFromNow(2), status:"upcoming", homePlayers:["p1","p2","p3"], awayPlayers:["p4","p5","p6"], result:null },
      { id:"f2", home:"RIV", away:"AJX", kickoff: hoursFromNow(4), status:"upcoming", homePlayers:["p7","p8","p9"], awayPlayers:["p10","p11","p12"], result:null },
      { id:"f3", home:"SEV", away:"LAZ", kickoff: hoursFromNow(6), status:"upcoming", homePlayers:["p13"], awayPlayers:["p14"], result:null },
      { id:"f4", home:"OLY", away:"SAN", kickoff: hoursFromNow(8), status:"upcoming", homePlayers:["p15"], awayPlayers:["p16"], result:null },
    ];

    // --------------------------- Scoring & Sim ---------------------------
    function scoreForPlayer(stat, pos, teamResult){
      let s=0; // base from result
      if(teamResult==="W") s+=10; else if(teamResult==="D") s+=3;
      if(stat.minutes>=90) s+=6; else if(stat.minutes>=60) s+=4; else if(stat.minutes>0) s+=2;
      const goalPts = pos===POS.FWD ? 8 : pos===POS.MID ? 10 : 12; s += goalPts*(stat.goals||0);
      s += 6*(stat.assists||0);
      if((pos===POS.DEF||pos===POS.GK) && stat.minutes>=60 && stat.cleanSheet) s+=8;
      if(pos===POS.GK){ s+=Math.floor((stat.saves||0)/3); s+=8*(stat.penSaves||0); }
      s -= 3*(stat.yellow||0); s -= 7*(stat.red||0); s -= 6*(stat.ownGoals||0); s -= 5*(stat.penMiss||0); s -= 5*(stat.penConceded||0);
      return s;
    }
    const newValueFromScore = (base, score) => Math.round(clamp(base*(1+score/50), base*0.2, base*3));

    function randomStatline(pos, gf, ga){
      const minutes = chance(0.1)?0: chance(0.15)?randInt(1,59): chance(0.35)?randInt(60,89): 90;
      let goals=0,assists=0,yellow=0,red=0,ownGoals=0,penMiss=0,penSaves=0,saves=0,penConceded=0;
      if(minutes>0){
        if(pos===POS.FWD) goals = chance(0.35)?1: chance(0.12)?2: chance(0.03)?3: 0;
        if(pos===POS.MID) goals = chance(0.18)?1: chance(0.05)?2: 0;
        if(pos===POS.DEF) goals = chance(0.08)?1: 0;
        assists = chance(0.25)?1: chance(0.07)?2: 0;
        yellow = chance(0.15)?1:0; red = yellow? (chance(0.05)?1:0) : (chance(0.02)?1:0);
        ownGoals = chance(0.01)?1:0; penMiss = chance(0.03)?1:0;
        if(pos===POS.GK){ saves=randInt(0,9); penSaves = chance(0.05)?1:0; }
        else if(pos===POS.DEF){ penConceded = chance(0.03)?1:0; }
        else if(pos===POS.MID){ penConceded = chance(0.02)?1:0; }
        else { penConceded = chance(0.01)?1:0; }
      }
      const cleanSheet = minutes>=60 && ga===0;
      return { minutes, goals, assists, yellow, red, ownGoals, penMiss, penSaves, saves, penConceded, cleanSheet };
    }

    // --------------------------- Storage ---------------------------
    const loadState = () => { try{ const raw=localStorage.getItem(LS_KEY); return raw? JSON.parse(raw): null; }catch{ return null; } };
    const saveState = (s) => { try{ localStorage.setItem(LS_KEY, JSON.stringify(s)); }catch{} };

    // --------------------------- Small UI Pieces ---------------------------
    function Tab({ label, value, active, onClick }) {
      const isActive = active === value;
      return (
        <button onClick={() => onClick(value)}
          className={`pressable rounded-xl px-3 py-2 text-sm font-medium transition ${
            isActive ? "bg-slate-900 text-white shadow" : "text-slate-700 hover:bg-slate-200"
          }`}>
          {label}
        </button>
      );
    }
    function EmptyCard({ title, subtitle }) {
      return (
        <div className="rounded-2xl border bg-white p-6 text-center shadow-sm">
          <div className="mx-auto mb-2 h-10 w-10 rounded-2xl bg-slate-100" />
          <div className="text-sm font-semibold">{title}</div>
          <div className="text-xs text-slate-500">{subtitle}</div>
        </div>
      );
    }
    const fmtTeam = (id, teamById) => teamById[id]?.name || id;
    const fmtTime = (iso) => new Date(iso).toLocaleString();
    const fmtFixture = (f, teamById) => !f ? "-" : `${fmtTeam(f.home,teamById)} vs ${fmtTeam(f.away,teamById)} (${fmtTime(f.kickoff)})`;

    function QtyBuy({ onBuy, price }) {
      const [qty, setQty] = useState(1);
      const disabled = qty < 1 || !Number.isFinite(qty);
      return (
        <div className="flex items-center gap-2">
          <input type="number" min={1} value={qty}
            onChange={(e)=> setQty(Math.max(1, Number(e.target.value||1)))}
            className="w-16 rounded-xl border bg-white px-2 py-1 text-sm shadow-sm"/>
          <button disabled={disabled}
            onClick={() => { onBuy(qty); playSound('sfx-click'); vibe(10); }}
            className={`pressable rounded-xl px-3 py-1.5 text-sm font-semibold text-white shadow
                       ${disabled? "bg-slate-400 cursor-not-allowed" : "bg-slate-900 hover:bg-slate-800"}`}>
            Buy · {(qty*price).toLocaleString()}c
          </button>
        </div>
      );
    }

    function NumField({ label, value, onChange, min = 0 }) {
      return (
        <label className="flex items-center gap-2 text-xs">
          <span className="w-20 text-slate-500">{label}</span>
          <input type="number" className="w-20 rounded-lg border bg-white px-2 py-1 shadow-sm"
                 value={value ?? 0} min={min} onChange={(e) => onChange(Number(e.target.value))}/>
        </label>
      );
    }
    function ToggleField({ label, value, onChange }) {
      return (
        <label className="flex items-center gap-2 text-xs">
          <span className="w-20 text-slate-500">{label}</span>
          <input type="checkbox" checked={!!value} onChange={(e)=>onChange(e.target.checked)}/>
        </label>
      );
    }

    function PlayerStatRow({ player, stats, onEdit }){
      const sixty = (stats?.minutes??0) >= 60;
      return (
        <div className="rounded-xl bg-white p-3 shadow-sm ring-1 ring-slate-200 fade-in">
          <div className="mb-2 flex items-center justify-between">
            <div>
              <div className="text-sm font-semibold">{player?.name}</div>
              <div className="text-xs text-slate-500">{player?.pos} • {player?.team}</div>
            </div>
            <div className="text-xs text-slate-500">60+? {sixty? "Yes":"No"}</div>
          </div>
          <div className="grid grid-cols-2 gap-3 md:grid-cols-4">
            <NumField label="Min" value={stats.minutes??0} onChange={(v)=>onEdit({ minutes: clamp(v,0,120) })} />
            <NumField label="Goals" value={stats.goals??0} onChange={(v)=>onEdit({ goals: Math.max(0,v) })} />
            <NumField label="Assists" value={stats.assists??0} onChange={(v)=>onEdit({ assists: Math.max(0,v) })} />
            <ToggleField label="CleanSheet" value={!!stats.cleanSheet} onChange={(v)=>onEdit({ cleanSheet: !!v })} />
            <NumField label="Yellow" value={stats.yellow??0} onChange={(v)=>onEdit({ yellow: Math.max(0,v) })} />
            <NumField label="Red" value={stats.red??0} onChange={(v)=>onEdit({ red: Math.max(0,v) })} />
            <NumField label="OwnGoals" value={stats.ownGoals??0} onChange={(v)=>onEdit({ ownGoals: Math.max(0,v) })} />
            <NumField label="PenMiss" value={stats.penMiss??0} onChange={(v)=>onEdit({ penMiss: Math.max(0,v) })} />
            {player?.pos===POS.GK && (
              <>
                <NumField label="Saves" value={stats.saves??0} onChange={(v)=>onEdit({ saves: Math.max(0,v) })} />
                <NumField label="PenSaves" value={stats.penSaves??0} onChange={(v)=>onEdit({ penSaves: Math.max(0,v) })} />
              </>
            )}
            <NumField label="PenConc" value={stats.penConceded??0} onChange={(v)=>onEdit({ penConceded: Math.max(0,v) })} />
          </div>
        </div>
      );
    }

    function FixtureCard({ fixture, playersById, teamById, onResolve, onEditStat }){
      const isFinished = fixture.status==="finished";
      return (
        <div className="rounded-2xl border bg-white p-4 shadow-sm fade-in">
          <div className="mb-3 flex flex-wrap items-center justify-between gap-2">
            <div>
              <div className="text-sm font-semibold">{fmtTeam(fixture.home,teamById)} <span className="text-slate-400">vs</span> {fmtTeam(fixture.away,teamById)}</div>
              <div className="text-xs text-slate-500">Kickoff: {fmtTime(fixture.kickoff)}</div>
            </div>
            <div className="flex items-center gap-2">
              {isFinished ? (
                <span className="rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-semibold text-emerald-700">
                  FT {fixture.result?.homeGoals ?? "-"}:{fixture.result?.awayGoals ?? "-"}
                </span>
              ) : (
                <span className="rounded-full bg-amber-100 px-2.5 py-1 text-xs font-semibold text-amber-700">Upcoming</span>
              )}
              {!isFinished && (
                <button onClick={() => { onResolve(); playSound('sfx-click'); vibe(10); }}
                  className="pressable rounded-xl bg-emerald-600 px-3 py-1.5 text-sm font-semibold text-white shadow hover:bg-emerald-700">
                  Resolve
                </button>
              )}
            </div>
          </div>

          {isFinished ? (
            <div className="grid grid-cols-1 gap-3 md:grid-cols-2">
              {[{label:"Home",ids:fixture.homePlayers},{label:"Away",ids:fixture.awayPlayers}].map(grp=> (
                <div key={grp.label} className="rounded-xl border bg-slate-50/60 p-3">
                  <div className="mb-2 text-xs font-semibold text-slate-600">{grp.label} Player Stats</div>
                  <div className="space-y-2">
                    {grp.ids.map(pid=> (
                      <PlayerStatRow key={pid} player={playersById[pid]} stats={fixture.result?.stats?.[pid]||{}} onEdit={(patch)=>onEditStat(pid, patch)} />
                    ))}
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="rounded-xl border border-dashed p-4 text-sm text-slate-500">
              Stats available after full-time. You can edit stats after resolving (for custom scenarios).
            </div>
          )}
        </div>
      );
    }

    function MarketGrid({ fixtures, players, teams, filterFixtureId, query, onBuy }){
      const teamById = Object.fromEntries(teams.map(t=>[t.id,t]));
      const fixturesShown = fixtures.filter(f=> f.status==="upcoming" && (filterFixtureId==="all" || filterFixtureId===f.id));
      const q = (query||"").trim().toLowerCase();
      return (
        <div className="grid grid-cols-1 gap-4">
          {fixturesShown.length===0 && <EmptyCard title="No upcoming fixtures" subtitle="Resolve some matches or reset the game to add more." />}
          {fixturesShown.map(f=> (
            <div key={f.id} className="rounded-2xl border bg-white p-4 shadow-sm pop">
              <div className="mb-3 flex flex-wrap items-center justify-between gap-2">
                <div className="text-sm font-semibold">
                  {fmtTeam(f.home,teamById)} <span className="text-slate-400">vs</span> {fmtTeam(f.away,teamById)}
                  <span className="ml-2 text-xs font-normal text-slate-500">Kickoff: {fmtTime(f.kickoff)}</span>
                </div>
                <span className="rounded-full bg-amber-100 px-2.5 py-1 text-xs font-semibold text-amber-700">Upcoming</span>
              </div>
              <div className="grid grid-cols-1 gap-3 md:grid-cols-2">
                {[{side:"Home",ids:f.homePlayers},{side:"Away",ids:f.awayPlayers}].map(side=> (
                  <div key={side.side} className="rounded-xl border bg-slate-50/60 p-3">
                    <div className="mb-2 text-xs font-semibold text-slate-600">{side.side} Players</div>
                    <div className="space-y-2">
                      {side.ids
                        .map(pid=> players.find(p=>p.id===pid))
                        .filter(Boolean)
                        .filter(p=> {
                          if(!q) return true;
                          return p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q) || p.pos.toLowerCase().includes(q);
                        })
                        .map(p=> (
                          <div key={p.id} className="flex items-center justify-between rounded-xl bg-white px-3 py-2 shadow-sm ring-1 ring-slate-200">
                            <div className="min-w-0">
                              <div className="text-sm font-semibold truncate">{p.name}</div>
                              <div className="text-xs text-slate-500 truncate">{p.pos} • {p.team} • Base {p.basePrice}c</div>
                            </div>
                            <QtyBuy onBuy={(qty)=>onBuy(p.id, f.id, qty)} price={p.basePrice} />
                          </div>
                        ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function PortfolioSummary({ balance, netWorth, portfolioValueOpen }){
      return (
        <div className="grid grid-cols-1 gap-3 sm:grid-cols-3">
          <StatTile label="Balance" value={`${balance.toLocaleString()}c`} />
          <StatTile label="Open Portfolio" value={`${portfolioValueOpen.toLocaleString()}c`} />
          <StatTile label="Net Worth" value={`${netWorth.toLocaleString()}c`} />
        </div>
      );
    }
    function StatTile({ label, value }){
      return (
        <div className="rounded-2xl border bg-white p-4 shadow-sm">
          <div className="text-xs text-slate-500">{label}</div>
          <div className="text-xl font-semibold">{value}</div>
        </div>
      );
    }
    function RulesCard(){
      return (
        <div className="rounded-2xl border bg-white p-6 shadow-sm">
          <h2 className="mb-3 text-lg font-bold">How it works (Model B)</h2>
          <ol className="list-decimal space-y-2 pl-5 text-sm text-slate-700">
            <li>You start with 500 coins. Buy <span className="font-semibold">player cards</span> before their fixtures.</li>
            <li>When a match finishes, the card value changes based on the player's performance.</li>
            <li><span className="font-semibold">Profits/losses are unrealized</span> until you hit <em>Sell</em> on a finished card.</li>
            <li>Your <span className="font-semibold">Net Worth</span> = Balance + Value of all unsold (open) cards.</li>
          </ol>
          <h3 className="mt-5 text-base font-semibold">Scoring → Value</h3>
          <div className="text-sm text-slate-700">
            <p className="mb-2">newValue = base × (1 + score/50) (clamped between 0.2× and 3× base).</p>
            <ul className="list-disc pl-5">
              <li>Team result: Win +10, Draw +3</li>
              <li>Minutes: &lt;60 +2, 60–89 +4, 90 +6</li>
              <li>Goals: FWD +8, MID +10, DEF/GK +12 each</li>
              <li>Assists: +6 each</li>
              <li>Clean sheet (DEF/GK, ≥60′, team concedes 0): +8</li>
              <li>GK saves: +1 per 3 saves; Penalty save +8</li>
              <li>Cards: Yellow −3, Red −7</li>
              <li>Own goal −6; Missed pen −5; Pen conceded −5</li>
            </ul>
          </div>
          <h3 className="mt-5 text-base font-semibold">Tips</h3>
          <ul className="list-disc pl-5 text-sm text-slate-700">
            <li>Diversify across fixtures and positions.</li>
            <li>For GKs/DEFs, clean sheets move value a lot.</li>
            <li>Use the <em>Fixtures</em> tab to tweak stats for custom scenarios.</li>
          </ul>
        </div>
      );
    }

    // --------------------------- Main Component ---------------------------
    function App(){
      const [state, setState] = useState(()=> loadState() || ({
        balance: 500,
        players: PLAYERS,
        teams: TEAMS,
        fixtures: FIXTURES,
        portfolio: [], // { id, playerId, fixtureId, boughtPrice, quantity, soldAt?: number }
        tx: [],         // transactions
      }));
      const [tab,setTab] = useState("market");
      const [fixtureFilter,setFixtureFilter] = useState("all");
      const [query,setQuery] = useState("");

      useEffect(()=> saveState(state), [state]);

      const byId = useMemo(()=>({
        player: Object.fromEntries(state.players.map(p=>[p.id,p])),
        team: Object.fromEntries(state.teams.map(t=>[t.id,t])),
        fixture: Object.fromEntries(state.fixtures.map(f=>[f.id,f])),
      }), [state.players,state.teams,state.fixtures]);

      const upcoming = state.fixtures.filter(f=>f.status==="upcoming");
      const finished = state.fixtures.filter(f=>f.status==="finished");

      function teamResultForPlayer(pid, fixture){
        const isHome = fixture.homePlayers.includes(pid);
        const {homeGoals,awayGoals} = fixture.result || {};
        if(homeGoals==null||awayGoals==null) return "D";
        if(homeGoals===awayGoals) return "D";
        const won = isHome? homeGoals>awayGoals : awayGoals>homeGoals;
        return won ? "W":"L";
      }

      function cardCurrentValue(card){
        const player = byId.player[card.playerId];
        const fixture = byId.fixture[card.fixtureId];
        if(!player||!fixture) return 0;
        if (fixture.status!=="finished" || !fixture.result)
          return player.basePrice * card.quantity;
        const stat = fixture.result.stats?.[card.playerId] || {};
        const teamRes = teamResultForPlayer(card.playerId, fixture);
        const score = scoreForPlayer(stat, player.pos, teamRes);
        return newValueFromScore(player.basePrice, score) * card.quantity;
      }

      const portfolioWithMeta = state.portfolio.map((c) => {
        const player = byId.player[c.playerId];
        const fixture = byId.fixture[c.fixtureId];
        const current = cardCurrentValue(c);
        const invested = c.boughtPrice * c.quantity;
        const roi = invested ? (current - invested) / invested : 0;
        return { ...c, player, fixture, current, invested, roi };
      });
      const portfolioValueOpen = portfolioWithMeta.filter(c=>!c.soldAt).reduce((s,c)=>s+c.current,0);
      const netWorth = state.balance + portfolioValueOpen;

      // --------------- Actions ---------------
      function buyCard(playerId, fixtureId, qty=1){
        const p = byId.player[playerId]; const f = byId.fixture[fixtureId];
        if(!p||!f||f.status!=="upcoming") return;
        const cost = p.basePrice*qty;
        if(state.balance<cost) return alert("Not enough coins.");
        const item = { id:`card_${Date.now()}_${Math.random().toString(36).slice(2,7)}`, playerId, fixtureId, boughtPrice:p.basePrice, quantity:qty, soldAt:null };
        setState(s=>({
          ...s,
          balance: s.balance-cost,
          portfolio: [item, ...s.portfolio],
          tx: [{ id:`tx_${Date.now()}`, type:"BUY", amount:-cost, ts:new Date().toISOString(), meta:{ playerId, fixtureId, qty } }, ...s.tx]
        }));
        // coin pop near click (basic)
        document.body.insertAdjacentHTML("beforeend", `<div class="coin-float text-xs font-semibold text-emerald-600" style="left: calc(50% + 120px); top: 80px">-${cost}c</div>`);
        setTimeout(()=>{ const last = document.querySelector(".coin-float:last-of-type"); last?.remove(); }, 800);
      }

      function sellCard(cardId){
        const card = state.portfolio.find(c=>c.id===cardId); if(!card||card.soldAt) return;
        const player = byId.player[card.playerId]; const fixture = byId.fixture[card.fixtureId];
        if(!fixture||fixture.status!=="finished") return alert("Match not finished yet.");
        const stat = fixture.result?.stats?.[card.playerId] || {};
        const teamRes = teamResultForPlayer(card.playerId, fixture);
        const score = scoreForPlayer(stat, player.pos, teamRes);
        const current = newValueFromScore(player.basePrice, score)*card.quantity;

        const profit = current - (card.boughtPrice*card.quantity);
        setState(s=>({
          ...s,
          balance: s.balance + current,
          portfolio: s.portfolio.map(c=> c.id===cardId? { ...c, soldAt: current } : c),
          tx: [{ id:`tx_${Date.now()}`, type:"SELL", amount: current, ts:new Date().toISOString(), meta:{ cardId, profit } }, ...s.tx]
        }));
        if(profit>0){ blastConfetti(); playSound('sfx-win'); vibe(30); }
        else { playSound('sfx-lose'); vibe(10); }
      }

      function resolveFixture(fixtureId){
        const idx = state.fixtures.findIndex(f=>f.id===fixtureId); if(idx===-1) return;
        const f = state.fixtures[idx]; if(f.status==="finished") return;
        const homeGoals = randInt(0,4); const awayGoals = randInt(0,4);
        const stats = {};
        const all = [...f.homePlayers, ...f.awayPlayers];
        for(const pid of all){
          const p = byId.player[pid];
          const isHome = f.homePlayers.includes(pid);
          const gf = isHome ? homeGoals : awayGoals;
          const ga = isHome ? awayGoals : homeGoals;
          stats[pid] = randomStatline(p.pos, gf, ga);
        }
        const updated = { ...f, status:"finished", result:{ homeGoals, awayGoals, stats } };
        setState(s=>({ ...s, fixtures: s.fixtures.map((fx,i)=> i===idx? updated : fx) }));
      }

      function resolveAllUpcoming(){ for(const f of state.fixtures.filter(x=>x.status==="upcoming")) resolveFixture(f.id); }

      function resetGame(){
        if(!confirm("Reset all progress?")) return;
        setState({ balance:500, players:PLAYERS, teams:TEAMS, fixtures:FIXTURES, portfolio:[], tx:[] });
        playSound('sfx-click');
      }

      function editStat(fixtureId, playerId, patch){
        setState(s=>({
          ...s,
          fixtures: s.fixtures.map(f=>{
            if(f.id!==fixtureId || !f.result) return f;
            const next = { ...(f.result.stats||{}) };
            next[playerId] = { ...(next[playerId]||{}), ...patch };
            return { ...f, result: { ...f.result, stats: next } };
          })
        }));
      }

      // --------------- UI ---------------
      return (
        <div className="min-h-screen">
          <header className="sticky top-0 z-20 border-b bg-white/90 backdrop-blur">
            <div className="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
              <div className="flex items-center gap-3">
                <span className="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 text-white font-bold">FS</span>
                <h1 className="text-lg sm:text-xl font-bold">FutStocks — Fantasy ROI</h1>
              </div>
              <div className="flex items-center gap-2">
                <div className="rounded-xl border bg-white px-3 py-1.5 text-sm shadow-sm">
                  Balance: <span className="font-semibold">{state.balance.toLocaleString()}c</span>
                </div>
                <div className="hidden sm:block rounded-xl border bg-white px-3 py-1.5 text-sm shadow-sm">
                  Net Worth: <span className="font-semibold">{netWorth.toLocaleString()}c</span>
                </div>
                <button onClick={resetGame}
                  className="pressable rounded-xl bg-slate-900 px-3 py-1.5 text-sm font-semibold text-white shadow hover:bg-slate-800">
                  Reset
                </button>
              </div>
            </div>
            <nav className="mx-auto max-w-6xl px-4 pb-2">
              <div className="flex gap-2">
                <Tab label="Market" value="market" active={tab} onClick={setTab} />
                <Tab label="My Portfolio" value="portfolio" active={tab} onClick={setTab} />
                <Tab label="Fixtures" value="fixtures" active={tab} onClick={setTab} />
                <Tab label="Rules" value="rules" active={tab} onClick={setTab} />
                <Tab label="Transactions" value="tx" active={tab} onClick={setTab} />
              </div>
            </nav>
          </header>

          <main className="mx-auto max-w-6xl px-4 py-6">
            {tab==="market" && (
              <section>
                <div className="mb-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                  <div className="flex items-center gap-2">
                    <select value={fixtureFilter} onChange={(e)=>setFixtureFilter(e.target.value)}
                      className="rounded-xl border bg-white px-3 py-2 text-sm shadow-sm">
                      <option value="all">All upcoming fixtures</option>
                      {upcoming.map(f=> (
                        <option key={f.id} value={f.id}>{fmtTeam(f.home,byId.team)} vs {fmtTeam(f.away,byId.team)} — {fmtTime(f.kickoff)}</option>
                      ))}
                    </select>
                    <input value={query} onChange={(e)=>setQuery(e.target.value)} placeholder="Search player/team/pos..."
                      className="w-64 rounded-xl border bg-white px-3 py-2 text-sm shadow-sm"/>
                  </div>
                  <button onClick={()=>{ resolveAllUpcoming(); playSound('sfx-click'); }}
                    className="pressable rounded-xl bg-emerald-600 px-3 py-2 text-sm font-semibold text-white shadow hover:bg-emerald-700">
                    Resolve ALL upcoming
                  </button>
                </div>
                <MarketGrid fixtures={state.fixtures} players={state.players} teams={state.teams}
                  filterFixtureId={fixtureFilter} query={query} onBuy={buyCard}/>
              </section>
            )}

            {tab==="portfolio" && (
              <section className="space-y-4">
                <PortfolioSummary balance={state.balance} netWorth={netWorth} portfolioValueOpen={portfolioValueOpen} />
                <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                  {portfolioWithMeta.length===0 && <EmptyCard title="No cards yet" subtitle="Buy cards from the Market before kickoff." />}
                  {portfolioWithMeta.map(c=>(
                    <div key={c.id} className="rounded-2xl border bg-white p-4 shadow-sm fade-in">
                      <div className="flex items-center justify-between">
                        <div className="min-w-0">
                          <div className="text-sm text-slate-500 truncate">{c.player?.pos} • {c.player?.team} • {c.player?.name}</div>
                          <div className="text-xs text-slate-500 truncate">Fixture: {fmtFixture(c.fixture, byId.team)}</div>
                        </div>
                        <div className="text-right">
                          <div className="text-sm">Bought @ <span className="font-semibold">{(c.boughtPrice*c.quantity).toLocaleString()}c</span></div>
                          <div className="text-sm">Current: <span className="font-semibold">{c.current.toLocaleString()}c</span></div>
                          <div className={`text-sm ${c.current-c.invested>=0?"text-emerald-600":"text-rose-600"}`}>ROI: {(c.roi*100).toFixed(1)}%</div>
                        </div>
                      </div>
                      <div className="mt-3 flex items-center justify-between">
                        <div className="text-xs text-slate-500">{c.fixture?.status==="finished" ? "Match finished" : "Locked until full-time"}</div>
                        <div className="flex gap-2">
                          {!c.soldAt && c.fixture?.status==="finished" && (
                            <button onClick={()=>sellCard(c.id)}
                              className="pressable rounded-xl bg-slate-900 px-3 py-1.5 text-sm font-semibold text-white shadow hover:bg-slate-800">
                              Sell
                            </button>
                          )}
                          {c.soldAt && (
                            <span className="rounded-xl bg-slate-100 px-3 py-1.5 text-sm font-semibold text-slate-700">
                              Sold @ {c.soldAt.toLocaleString()}c
                            </span>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </section>
            )}

            {tab==="fixtures" && (
              <section className="space-y-5">
                {state.fixtures.map(f=> (
                  <FixtureCard key={f.id} fixture={f} playersById={byId.player} teamById={byId.team}
                    onResolve={()=>resolveFixture(f.id)}
                    onEditStat={(pid,patch)=>editStat(f.id, pid, patch)} />
                ))}
              </section>
            )}

            {tab==="rules" && <RulesCard />}

            {tab==="tx" && (
              <section className="space-y-2">
                {state.tx.length===0 ? (
                  <EmptyCard title="No transactions yet" subtitle="Buys and sells will appear here." />
                ) : (
                  <div className="overflow-hidden rounded-2xl border bg-white shadow-sm">
                    <table className="w-full text-sm">
                      <thead className="bg-slate-50 text-left text-slate-600">
                        <tr><th className="px-4 py-3">Time</th><th className="px-4 py-3">Type</th><th className="px-4 py-3">Amount</th><th className="px-4 py-3">Meta</th></tr>
                      </thead>
                      <tbody>
                        {state.tx.map(t=>(
                          <tr key={t.id} className="border-t">
                            <td className="px-4 py-3 text-slate-500">{new Date(t.ts).toLocaleString()}</td>
                            <td className="px-4 py-3 font-semibold">{t.type}</td>
                            <td className={`px-4 py-3 ${t.amount>=0?"text-emerald-700":"text-rose-700"}`}>{t.amount.toLocaleString()}c</td>
                            <td className="px-4 py-3 text-slate-500 text-xs">{JSON.stringify(t.meta)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </section>
            )}
          </main>

          <footer className="mt-8 border-t bg-white/70">
            <div className="mx-auto max-w-6xl px-4 py-6 text-xs text-slate-500">
              Built for fun. Not affiliated with any club. All names are placeholders.
            </div>
          </footer>

          <!-- SFX tags (drop your mp3s in same folder and set src) -->
          <audio id="sfx-click" src="" preload="auto"></audio>
          <audio id="sfx-win"   src="" preload="auto"></audio>
          <audio id="sfx-lose"  src="" preload="auto"></audio>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
